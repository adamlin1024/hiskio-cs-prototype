<h1>如何查看任務</h1>
<div class="csh-article-content-header" role="heading"><div class="csh-article-content-header-metas"><div class="csh-article-content-header-metas-category csh-font-sans-regular">有關的文章：<span> </span><a href="/zh-tw/category/5oq155so5yi46iih5lu75yuz5p2-q0pj6k/" role="link">抵用券與任務板</a></div></div><h1 class="csh-font-sans-bold">如何查看任務</h1></div><div class="csh-article-content-text csh-article-content-text-large" role="article"><p><span>點擊「 </span><a class="csh-markdown csh-markdown-link csh-markdown-link-text" rel="noopener noreferrer" target="_blank" href="https://hiskio.com/account/missions"><span>任務板</span></a><span> 」連結，或依照以下步驟，即可進入任務版查看您的任務：</span></p><p><br></p><ol class="csh-markdown csh-markdown-list csh-markdown-list-ordered"><li value="1" class="csh-markdown csh-markdown-list-item"><span>點選畫面右上方個人頭像（手機版為右上方選單按鈕）</span></li></ol><p><br></p><ol class="csh-markdown csh-markdown-list csh-markdown-list-ordered" start="2"><li value="2" class="csh-markdown csh-markdown-list-item"><span>於展開選單點選「 </span><a class="csh-markdown csh-markdown-link csh-markdown-link-text" rel="noopener noreferrer" target="_blank" href="https://hiskio.com/account/missions"><span>任務板</span></a><span> 」即可進入。</span></li></ol><span class="csh-markdown csh-markdown-line csh-article-content-separate csh-article-content-separate-top"></span><p class="csh-article-content-updated csh-text-wrap csh-font-sans-light">更新時間： 14/12/2022</p><span class="csh-markdown csh-markdown-line csh-article-content-separate csh-article-content-separate-bottom"></span></div>
