<h1>如何製作、查詢筆記</h1>
<div class="csh-article-content-header" role="heading"><div class="csh-article-content-header-metas"><div class="csh-article-content-header-metas-category csh-font-sans-regular">有關的文章：<span> </span><a href="/zh-tw/category/6zal5ael5lik6kqy-x12iv/" role="link">開始上課</a></div></div><h1 class="csh-font-sans-bold">如何製作、查詢筆記</h1></div><div class="csh-article-content-text csh-article-content-text-large" role="article"><h3 onclick="CrispHelpdeskCommon.go_to_anchor(this)" id="3-6ko95l2c562g6kiy" class="csh-markdown csh-markdown-title csh-markdown-title-h3 csh-font-sans-semibold"><span>製作筆記</span></h3><p><br></p><p><span>當您在觀看課程時，於影片下方的輸入欄位輸入文字，並按下 Enter 送出，就可以製作專屬於您的筆記，如須換行請使用 Shfit + Enter 組合鍵。</span></p><p><br></p><p><span class="csh-markdown csh-markdown-image"><img src="images/eb6b0e7e-2cef-4e2b-b468-3d5b13_pjrzpl.png" alt="" loading="lazy"></span></p><p><br></p><h3 onclick="CrispHelpdeskCommon.go_to_anchor(this)" id="3-5pl55yl562g6kiy" class="csh-markdown csh-markdown-title csh-markdown-title-h3 csh-font-sans-semibold"><span>查看筆記</span></h3><p><br></p><p><span>點選下方「課程筆記」分頁，即可彈出筆記視窗查看筆記內容。</span></p><p><br></p><p><span class="csh-markdown csh-markdown-image"><img src="images/a3bab4a4-de80-4f53-9e2a-cd3ae6_skthk5.png" alt="" loading="lazy"></span></p><p><br></p><h3 onclick="CrispHelpdeskCommon.go_to_anchor(this)" id="3-5yiq6zmk562g6kiy" class="csh-markdown csh-markdown-title csh-markdown-title-h3 csh-font-sans-semibold"><span>刪除筆記</span></h3><p><br></p><p><span>在彈出的視窗中，點選筆記右側的「X」鍵，可以將您所製作的筆記刪除。</span></p><p><br></p><p><span class="csh-markdown csh-markdown-image"><img src="images/41b8d177-61e1-4473-b28a-de6a29_wr4v05.png" alt="" loading="lazy"></span></p><span class="csh-markdown csh-markdown-line csh-article-content-separate csh-article-content-separate-top"></span><p class="csh-article-content-updated csh-text-wrap csh-font-sans-light">更新時間： 16/03/2023</p><span class="csh-markdown csh-markdown-line csh-article-content-separate csh-article-content-separate-bottom"></span></div>
