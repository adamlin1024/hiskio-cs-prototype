<h1>是否可以多人共享課程</h1>
<div class="csh-article-content-header" role="heading"><div class="csh-article-content-header-metas"><div class="csh-article-content-header-metas-category csh-font-sans-regular">有關的文章：<span> </span><a href="/zh-tw/category/6zal5ael5lik6kqy-x12iv/" role="link">開始上課</a></div></div><h1 class="csh-font-sans-bold">是否可以多人共享課程</h1></div><div class="csh-article-content-text csh-article-content-text-large" role="article"><p><span>每一門課程都只授權「單一用戶」觀看，不得與其他人進行分享、公開播放，甚至轉售。</span></p><p><br></p><p><span>當發現有任何侵害平台或者該授課老師權益的狀況發生時，例如：多重帳號登入、公開分享...等，HiSKIO 將中止該用戶之帳戶權限，並依侵權範圍，循法律途徑維護其他老師與使用者的權益。</span></p><p><br></p><p><span>若有多人觀看或者公開播放之需求，請來信 </span><a class="csh-markdown csh-markdown-link csh-markdown-link-text" rel="noopener noreferrer" target="_blank" href="mailto:support@hiskio.com"><span>support@hiskio.com</span></a><span>。</span></p><p><br></p><h3 onclick="CrispHelpdeskCommon.go_to_anchor(this)" id="3-4pan5bcp5oq6yas" class="csh-markdown csh-markdown-title csh-markdown-title-h3 csh-font-sans-semibold"><span>▍小提醒</span></h3><p><br></p><p><b><strong style="white-space:pre-wrap" class="csh-markdown csh-markdown-bold csh-font-sans-medium">因應資安考量，HiSKIO 帳戶只能單一設備登入，若有重複登入的情形，前一登入裝置將會被強制登出。</strong></b></p><span class="csh-markdown csh-markdown-line csh-article-content-separate csh-article-content-separate-top"></span><p class="csh-article-content-updated csh-text-wrap csh-font-sans-light">更新時間： 13/12/2022</p><span class="csh-markdown csh-markdown-line csh-article-content-separate csh-article-content-separate-bottom"></span></div>
